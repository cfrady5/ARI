name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to main.
# The site lives at the repo root (so "Deploy from a branch / root" also works);
# this workflow assembles a clean copy and deploys it via the GitHub Actions
# Pages source. Either Pages source setting will serve the site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (exclude repo internals)
        run: |
          mkdir -p _site
          cp -r index.html styles.css script.js assets \
                about accessibility contact events initiatives \
                press-insights privacy terms \
                .nojekyll _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
